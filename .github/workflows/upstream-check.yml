name: Upstream Check

# Runs daily at 09:30 UTC to fetch anthropic-watch feeds and file an issue for
# Worclaude-relevant upstream changes. See docs/reference/upstream-automation.md.
#
# State persistence: `.github/upstream-state.json` lives in `actions/cache@v4`
# under key prefix `upstream-state-v3-`. The workflow does NOT push to `main`
# for state updates — main can stay fully PR-protected without exemptions.
# The cache is restored before pre-check and saved at job end.

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch: {}

permissions:
  issues: write
  id-token: write

concurrency:
  group: upstream-check
  cancel-in-progress: false

env:
  LABEL_UPSTREAM: upstream
  LABEL_AUTOMATED: automated
  LABEL_FETCH_ERROR: fetch-error
  LABEL_PARSE_ERROR: parse-error

jobs:
  upstream-check:
    runs-on: ubuntu-latest
    # INVARIANT: every step that creates or closes GitHub issues is gated on
    # github.ref == 'refs/heads/main'. Feature-branch runs exercise pre-check,
    # Claude, and the parser without side effects. State persistence runs on
    # every branch but is auto-scoped by `actions/cache`'s per-ref isolation.
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=optional --prefer-offline --no-audit --no-fund

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: .github/upstream-state.json
          key: upstream-state-v3-${{ github.run_id }}
          restore-keys: |
            upstream-state-v3-

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "$LABEL_UPSTREAM" --color 0e8a16 \
            --description "Anthropic upstream change summary" 2>/dev/null || true
          gh label create "$LABEL_AUTOMATED" --color ededed \
            --description "Opened by an automated workflow" 2>/dev/null || true
          gh label create "$LABEL_FETCH_ERROR" --color d93f0b \
            --description "anthropic-watch feed unreachable" 2>/dev/null || true
          gh label create "$LABEL_PARSE_ERROR" --color d93f0b \
            --description "upstream-check Claude output failed contract parse" 2>/dev/null || true

      - name: Pre-check
        id: precheck
        run: node scripts/upstream-precheck.mjs

      # The pre-check writes `.github/upstream-state.json` directly when fetch
      # fails. The cache save step at job end persists it; no commit/push needed.

      - name: Watchdog — open feed-unreachable issue on 3rd strike
        id: watchdog-open
        if: steps.precheck.outputs.fetch_failure == 'true' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONSECUTIVE: ${{ steps.precheck.outputs.consecutive_failures }}
          FETCH_ERROR: ${{ steps.precheck.outputs.fetch_error }}
        run: |
          if [ "$CONSECUTIVE" -lt 3 ]; then
            echo "Only $CONSECUTIVE consecutive failures — not opening watchdog yet."
            exit 0
          fi
          EXISTING=$(gh issue list --label "$LABEL_FETCH_ERROR" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Watchdog already open; skipping."
            exit 0
          fi
          TODAY=$(date -u +%Y-%m-%d)
          BODY_FILE="$RUNNER_TEMP/watchdog-body.md"
          cat > "$BODY_FILE" <<BODY
          The anthropic-watch feeds have been unreachable for ${CONSECUTIVE} consecutive runs of \`.github/workflows/upstream-check.yml\`.

          Last error:

          \`\`\`
          ${FETCH_ERROR}
          \`\`\`

          The workflow will continue to retry daily at 09:30 UTC. Trigger a manual re-check:

          \`\`\`
          gh workflow run upstream-check.yml
          \`\`\`

          This issue will be closed automatically on the first successful run.
          BODY
          URL=$(gh issue create \
            --title "upstream: anthropic-watch feeds unreachable (${TODAY})" \
            --body-file "$BODY_FILE" \
            --label "$LABEL_UPSTREAM" --label "$LABEL_AUTOMATED" --label "$LABEL_FETCH_ERROR")
          NUM="${URL##*/}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "num=$NUM" >> "$GITHUB_OUTPUT"

          # Amend state with the watchdog issue number. The cache save step at
          # job end persists the file; no git commit/push needed.
          node -e "
            const fs = require('node:fs');
            const p = '.github/upstream-state.json';
            const s = JSON.parse(fs.readFileSync(p, 'utf8'));
            s.openWatchdogIssueNumber = ${NUM};
            fs.writeFileSync(p, JSON.stringify(s, null, 2) + '\n');
          "

      - name: Claude cross-reference
        id: claude
        # claude-code-action@v1 operates on the workflow's current checkout by
        # default (documented in its README). Feed-derived content is untrusted,
        # so --disallowedTools narrows the default toolset to Read-only.
        if: steps.precheck.outputs.has_new == 'true' && steps.precheck.outputs.fetch_failure != 'true'
        uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009 # v1.0.101
        env:
          NEW_ITEMS_PATH: ${{ steps.precheck.outputs.new_items_path }}
          FEED_REPORT_PATH: ${{ steps.precheck.outputs.feed_report_path }}
          RUN_TIMESTAMP: ${{ steps.precheck.outputs.run_timestamp }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-sonnet-4-6 --max-turns 25 --disallowedTools Edit Write Bash NotebookEdit'
          prompt: |
            You are auditing new Anthropic upstream items to decide whether the Worclaude maintainer should open a GitHub issue about them.

            Inputs are provided as files (paths in environment variables):
            - NEW_ITEMS_PATH: JSON array of new feed items since the last run
            - FEED_REPORT_PATH: full run-report.json for source health context
            - RUN_TIMESTAMP: ISO timestamp of when anthropic-watch's scraper last ran

            Read the input files with the Read tool. Do NOT use Bash, Edit, Write, or NotebookEdit — those tools are disallowed by the workflow for security reasons.

            Pre-baked facts (verified 2026-04-28, do not re-check):
            - Worclaude does NOT depend on `@anthropic-ai/sdk` or `anthropic`. Treat API/SDK docs items as informational unless this phase re-verifies that fact.
            - Agent model fields in Worclaude use short aliases (`sonnet`, `opus`, `haiku`) — never fully-qualified IDs. Model-ID bumps in changelogs do NOT affect the agent catalog.
            - The anthropic-watch feed is now at v1.0 schema with three `sourceCategory` values: `core`, `extended`, `community`. Per upstream's contract (anthropic-watch/docs/WORCLAUDE-INTEGRATION.md), `community` items (Reddit, Hacker News, Twitter/X, GitHub commits on Anthropic-owned repos that ship via direct commits rather than tagged releases) are **informational signal only** — never autonomous-action triggers. Treat them as Informational unless a community item explicitly names a Worclaude file or contradicts a known convention.
            - Source count is dynamic — read `summary.sourcesChecked` from FEED_REPORT_PATH for the current count. Do not assume a specific number.

            Do all of the following:

            1. Read NEW_ITEMS_PATH and group items by source.

            2. For each item, decide if it is "worth a Worclaude issue." Use the cross-reference rules in `docs/reference/upstream-automation.md` — read that file with the Read tool and follow the "Classification Rules" section (the critical-source list, the Worclaude-specific cross-reference rules against templates/agents, templates/commands, templates/hooks, src/data/agents.js, src/data/agent-registry.js, docs/spec/BACKLOG.md, and CLAUDE.md Critical Rules).

            3. An item is worth an issue if it falls into any of these buckets:
               - Claude Code release / changelog / npm — always worth mentioning
               - Agent SDK TS/Py changelog — always worth mentioning
               - Engineering blog with a new pattern, skill idea, or convention — worth mentioning
               - Any item that you can tie to a specific Worclaude file or backlog entry — worth mentioning
               Items that are NOT worth an issue: status page incidents, marketing blog posts unrelated to developer workflow, API/SDK docs (per pre-baked fact above), `sourceCategory: community` items unless they explicitly name a Worclaude file.

            4. Your final assistant response is the output. Print it directly with no preamble and no commentary after. Do not use Write, Bash, or any other tool to emit output — just type your response. The action captures the full transcript; the parser reads the final assistant message from that transcript.

            5. Output format — first non-whitespace line of your final response determines the path:

               If NO items are worth an issue, print exactly one line (and nothing else):
                 SKIP_ISSUE

               If AT LEAST ONE item is worth an issue, print exactly this structure (no preamble, no trailing commentary):

                 # Title: upstream: {N} new items to review ({YYYY-MM-DD})
                 # Body
                 ## Summary
                 {one-paragraph overview: how many items, which sources, whether any CRITICAL ones exist}

                 ## Worth Action
                 {bulleted list of items that map to specific Worclaude files; each bullet: **[Source] Title** ([url]({url})) — one-line why-it-matters — affected file(s)}

                 ## Informational
                 {bulleted list of items worth knowing but not requiring action; each bullet: title, source, one-line reason}

                 ## Recommended Actions
                 {numbered list of concrete follow-ups, each naming a specific file and the upstream change that prompts it; at most 5 items, ordered by urgency}

                 ---
                 _Generated by `.github/workflows/upstream-check.yml` on {RUN_TIMESTAMP}. Close this issue after reviewing._

            Rules:
            - Be concrete. "Check the agents" is wrong; "Check src/data/agents.js — Sonnet ID field for the ui-reviewer agent" is right.
            - Keep Summary ≤ 3 sentences, "Worth Action" ≤ 8 bullets, "Informational" ≤ 10 bullets, "Recommended Actions" ≤ 5 items.
            - If confidence that an item affects Worclaude is low, list it as Informational rather than Worth Action.
            - Use the Read tool only for files mentioned in the cross-reference rules. Do not wander the repo.
            - The parser is strict. Do NOT emit any text before the first contract line (`SKIP_ISSUE` or `# Title: `) in your final response. No preamble like "I've analyzed...", no reasoning summary, no closing "hope this helps." Just the contract content.

      - name: Parse Claude output
        id: parse
        if: steps.claude.outcome == 'success'
        run: node scripts/upstream-parse.mjs "${{ steps.claude.outputs.execution_file }}"

      # Advance state on any successful parse — including SKIP. Leaving state
      # un-advanced on SKIP causes Claude to re-evaluate the same feed items
      # on every subsequent run until something is eventually deemed worth an
      # issue, which is wasteful when upstream is quiet relative to Worclaude.
      # Parse errors still skip this step so the items get re-evaluated after
      # a fix. The cache save step at job end persists the file.
      - name: State write
        id: state-write
        if: >-
          github.ref == 'refs/heads/main'
          && steps.precheck.outputs.has_new == 'true'
          && steps.claude.outcome == 'success'
          && steps.parse.outcome == 'success'
          && steps.parse.outputs.parse_error == ''
        env:
          NEXT_STATE_PATH: ${{ steps.precheck.outputs.next_state_path }}
        run: |
          cp "$NEXT_STATE_PATH" .github/upstream-state.json

      - name: Create issue
        id: create-issue
        if: >-
          github.ref == 'refs/heads/main'
          && steps.parse.outcome == 'success'
          && steps.parse.outputs.skip == 'false'
          && steps.parse.outputs.parse_error == ''
          && steps.state-write.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL=$(gh issue create \
            --title "${{ steps.parse.outputs.title }}" \
            --body-file "${{ steps.parse.outputs.body_path }}" \
            --label "$LABEL_UPSTREAM" --label "$LABEL_AUTOMATED")
          NUM="${URL##*/}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "num=$NUM" >> "$GITHUB_OUTPUT"

      - name: Rollback — close superseded upstream issues
        if: github.ref == 'refs/heads/main' && steps.create-issue.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_ISSUE_NUM: ${{ steps.create-issue.outputs.num }}
        run: |
          gh issue list --label "$LABEL_UPSTREAM" --state open \
            --json number,createdAt,comments,reactionGroups \
          | node -e "
              const issues = JSON.parse(require('fs').readFileSync(0));
              const today = process.env.NEW_ISSUE_NUM;
              const cutoff = Date.now() - 24*60*60*1000;
              for (const i of issues) {
                if (String(i.number) === today) continue;
                if (new Date(i.createdAt).getTime() > cutoff) continue;
                if (i.comments > 0) continue;
                if (i.reactionGroups.some(r => r.reactors.totalCount > 0)) continue;
                console.log(i.number);
              }
            " \
          | while read num; do
              gh issue close "$num" --comment "Superseded by #$NEW_ISSUE_NUM — no interaction recorded on this issue."
            done

      - name: Watchdog — recover (close feed-unreachable issue)
        if: >-
          github.ref == 'refs/heads/main'
          && steps.precheck.outputs.fetch_failure == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_TIMESTAMP: ${{ steps.precheck.outputs.run_timestamp }}
        run: |
          OPEN_WATCHDOG=$(gh issue list --label "$LABEL_FETCH_ERROR" --state open --json number --jq '.[0].number // empty')
          if [ -z "$OPEN_WATCHDOG" ]; then
            exit 0
          fi
          gh issue close "$OPEN_WATCHDOG" \
            --comment "Feeds recovered at ${RUN_TIMESTAMP}."
          # Clear the watchdog flag locally; cache save at job end persists it.
          node -e "
            const fs = require('node:fs');
            const p = '.github/upstream-state.json';
            const s = JSON.parse(fs.readFileSync(p, 'utf8'));
            if (s.openWatchdogIssueNumber != null) {
              s.openWatchdogIssueNumber = null;
              fs.writeFileSync(p, JSON.stringify(s, null, 2) + '\n');
            }
          "

      - name: Parse-error fallback issue
        if: >-
          github.ref == 'refs/heads/main'
          && steps.parse.outcome == 'success'
          && steps.parse.outputs.parse_error != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RAW_PATH: ${{ steps.parse.outputs.raw_path }}
          PARSE_ERROR: ${{ steps.parse.outputs.parse_error }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          gh issue create \
            --title "upstream: parse error on ${TODAY}" \
            --body-file "$RAW_PATH" \
            --label "$LABEL_UPSTREAM" --label "$LABEL_AUTOMATED" --label "$LABEL_PARSE_ERROR"

      - name: Save state cache
        if: always() && steps.precheck.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: .github/upstream-state.json
          key: upstream-state-v3-${{ github.run_id }}

      - name: Step summary
        if: always()
        env:
          FETCH_FAILURE: ${{ steps.precheck.outputs.fetch_failure }}
          CONSECUTIVE: ${{ steps.precheck.outputs.consecutive_failures }}
          NEW_COUNT: ${{ steps.precheck.outputs.new_count }}
          RUN_TIMESTAMP: ${{ steps.precheck.outputs.run_timestamp }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          PARSE_OUTCOME: ${{ steps.parse.outcome }}
          PARSE_SKIP: ${{ steps.parse.outputs.skip }}
          PARSE_ERROR: ${{ steps.parse.outputs.parse_error }}
          ISSUE_NUM: ${{ steps.create-issue.outputs.num }}
          WATCHDOG_NUM: ${{ steps.watchdog-open.outputs.num }}
        run: |
          FETCH_STATUS="ok"
          if [ "$FETCH_FAILURE" = "true" ]; then
            FETCH_STATUS="failed (${CONSECUTIVE} consecutive)"
          fi
          PARSE_STATUS="$PARSE_OUTCOME"
          if [ "$PARSE_SKIP" = "true" ]; then
            PARSE_STATUS="skip"
          elif [ -n "$PARSE_ERROR" ]; then
            PARSE_STATUS="error: $PARSE_ERROR"
          fi
          {
            echo "## Upstream Check"
            echo "- Run timestamp: ${RUN_TIMESTAMP:-n/a}"
            echo "- Fetch: ${FETCH_STATUS}"
            echo "- New items: ${NEW_COUNT:-0}"
            echo "- Claude: ${CLAUDE_OUTCOME:-skipped}"
            echo "- Parse: ${PARSE_STATUS:-skipped}"
            echo "- Issue: ${ISSUE_NUM:-none}"
            echo "- Watchdog: ${WATCHDOG_NUM:-none}"
          } >> "$GITHUB_STEP_SUMMARY"
