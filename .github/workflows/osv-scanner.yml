name: OSV Scanner

# PR runs block on vulnerability; scheduled runs warn-only. SARIF uploaded
# to the repo's Security tab in both cases. See SECURITY.md.
#
# Both jobs call Google's reusable workflows directly — `osv-scanner-action`
# is distributed as workflow_call entries, not a step-level action. The
# reusable workflows handle checkout, scanner install, scan, and SARIF
# upload on their own.

on:
  pull_request:
    branches: [main, develop]
  merge_group:
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC — staggered against upstream-check.yml
  push:
    branches: [main]
  workflow_dispatch: {}

# Ceiling permissions for the reusable workflows below. Google's canonical
# example sets these at the workflow level; without them, GitHub rejects the
# reusable-workflow call at validation time (startup_failure).
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-pr:
    # `--lockfile=package-lock.json` scopes the scan to the root lockfile only;
    # without it, OSV-Scanner auto-discovers every lockfile in the repo
    # including `tests/fixtures/scanner/**` which intentionally pin vulnerable
    # versions for detector tests. See SECURITY.md "Test fixture manifests".
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.5
    with:
      scan-args: |-
        --lockfile=package-lock.json

  scan-scheduled:
    if: github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --lockfile=package-lock.json
      fail-on-vuln: false
